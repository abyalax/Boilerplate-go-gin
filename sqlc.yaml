version: "2"
sql:
  - schema: db/migration
    queries: db/query/users
    engine: postgresql
    gen:
      go:
        package: "users"
        out: "src/modules/users"

  - schema: db/migration
    queries: db/query/auth
    engine: postgresql
    gen:
      go:
        package: "auth"
        out: "src/modules/auth"
